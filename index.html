<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Priyanka Soni</title>
    <meta name="description" content="Priyanka Soni" />
    <meta name="author" content="Priyanka Soni" />
    <link rel="icon" type="image/png" href="/portfolio.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Prevent dark mode flash by applying theme before page renders
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (
          savedTheme === "dark" ||
          (!savedTheme &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      /* Prevent white flash and font loading shift */
      html {
        background-color: #fafafa;
      }
      html.dark {
        background-color: #0a0a0a;
      }
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
